<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atmosphère — Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="default">
  <div class="grain" aria-hidden="true"></div>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sb-brand">
        <span class="sb-mark">A</span>
        <div class="sb-text">
          <span class="sb-name">tmosphère</span>
          <span class="sb-tagline">Weather</span>
        </div>
      </div>
      <nav class="sb-nav">
        <a class="sb-link is-active" href="#section-today" data-nav="today">
          <span class="sb-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
          </span>
          <span class="sb-label">Today</span>
        </a>
        <a class="sb-link" href="#section-hourly" data-nav="hourly">
          <span class="sb-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </span>
          <span class="sb-label">Hourly</span>
        </a>
        <a class="sb-link" href="#section-daily" data-nav="daily">
          <span class="sb-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
          <span class="sb-label">Daily</span>
        </a>
      </nav>
      <div class="sb-footer">Open-Meteo API</div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div class="search-box">
          <svg class="s-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="city-input" placeholder="Search city or location..." autocomplete="off" spellcheck="false" aria-label="Search city">
          <button id="search-button">Search</button>
        </div>
        <span class="live-time" id="live-time"></span>
      </header>

      <div class="scroll-area">
        <div id="content">
          <div class="welcome-state">
            <p class="welcome-heading">Search a city to see the weather.</p>
            <p class="welcome-sub">Hourly &amp; daily forecasts, conditions, and more.</p>
          </div>
        </div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
